# This action requires the following secrets to be set:
#   github.token - set by GH
#   PINATA_JWT - exported as a JWT from the Pinata dashboard
#   IPFS_NINJA_API_KEY - created in the API Keys section of the ipfs.ninja dashboard
#   CLOUDFLARE_DNS_RECORD_ID - Cloudflare assigns an ID to every DNS record. copied from the Cloudflare API
#   CLOUDFLARE_ZONE_ID - Cloudflare refers to each domain as a "Zone". They are assigned IDs by Cloudflare. copied from the Cloudflare dashboard
#   CLOUDFLARE_AUTH_TOKEN - an API Token with the scope dns:edit for the jamesyoung.ch Zone. copied from the Cloudflare dashboard

name: Deploy to GitHub Pages & IPFS
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6 # pnpm version is read from package.json

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

        #  POSSIBLY UNNEEDED
      # This step adds some random noise to a file in Dist.
      # Pinata fails if the upload is identical to an existing upload.
      # The added noise makes each build unique.
      # - name: Add Noise to Dist
      #   run: dd if=/dev/urandom of=dist/noise bs=200 count=1

      - uses: actions/upload-artifact@v7
        with:
          name: build-dist
          path: dist
          retention-days: 1

  deploy-gh-pages:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: dist

      - name: Deploy to GH Pages 🚀
        uses: JamesIves/github-pages-deploy-action@3.7.1
        with:
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH: gh-pages # The branch the action should deploy to.
          FOLDER: dist # The folder the action should deploy.
          CLEAN: true # Automatically remove deleted files from the deploy branch.

  create-ipfs-car:
    runs-on: ubuntu-latest
    needs:
      - build
    outputs:
      cid: ${{ steps.create-car.outputs.cid }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: dist
      
      - name: Create IPFS CAR
        uses: ipshipyard/ipfs-deploy-action@v2.0.0
        id: create-car
        with:
          path-to-deploy: 'dist'
          cid-profile: 'unixfs-v1-2025'  # IPIP-0499; switch to 'unixfs-v0-2015' only if you need legacy CIDv0
          github-token: ${{ github.token }}
      
      - uses: actions/upload-artifact@v7
        with:
          name: build-car
          path: ${{ steps.create-car.outputs.car-path }}
          retention-days: 1
  
  upload-ipfs-ninja:
    runs-on: ubuntu-latest
    needs:
      - create-ipfs-car
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          name: build-car
          path: car

      - name: Upload CAR to ipfs.ninja
        id: upload-ipfs-ninja
        env:
          IPFS_NINJA_API_KEY: ${{ secrets.IPFS_NINJA_API_KEY }}
          CID: ${{ needs.create-ipfs-car.outputs.cid }}
        run: |
          # get the path to the CAR file in the car directory
          CAR_PATH=$(find car -type f)

          # Our CAR could end up over the 7MB simple-upload limit, so always
          # use ipfs.ninja's presigned-URL flow (works up to 5GB):
          # https://ipfs.ninja/docs/api/large-uploads
          size_bytes=$(stat -c%s "$CAR_PATH")
          size_mb=$(awk "BEGIN { printf \"%.6f\", $size_bytes / 1000000 }")
          description="${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          content_type="application/vnd.ipld.car"

          # 1. Initialize the upload and get a presigned S3 URL.
          init_response=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://api.ipfs.ninja/upload/init" \
            -H "X-Api-Key: ${IPFS_NINJA_API_KEY}" \
            -H "Content-Type: application/json" \
            --data "$(jq -n \
              --argjson sizeMB "$size_mb" \
              --arg contentType "$content_type" \
              --arg description "$description" \
              '{sizeMB: $sizeMB, contentType: $contentType, description: $description, car: true}')")

          init_http_code=$(echo "$init_response" | tail -n1)
          init_body=$(echo "$init_response" | sed '$d')

          if [ "$init_http_code" != "200" ]; then
            echo "::error::ipfs.ninja upload init failed (HTTP $init_http_code): $init_body"
            exit 1
          fi

          upload_id=$(echo "$init_body" | jq -r '.uploadId')
          upload_url=$(echo "$init_body" | jq -r '.uploadUrl')

          # 2. PUT the raw CAR bytes to the presigned URL.
          put_http_code=$(curl -sS -o /dev/null -w "%{http_code}" -X PUT \
            "$upload_url" \
            -H "Content-Type: ${content_type}" \
            --data-binary "@${CAR_PATH}")

          if [ "$put_http_code" -lt 200 ] || [ "$put_http_code" -ge 300 ]; then
            echo "::error::ipfs.ninja presigned upload failed (HTTP $put_http_code)"
            exit 1
          fi

          # 3. Complete the upload and get back the resulting CID.
          complete_response=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://api.ipfs.ninja/upload/complete/${upload_id}" \
            -H "X-Api-Key: ${IPFS_NINJA_API_KEY}")

          complete_http_code=$(echo "$complete_response" | tail -n1)
          complete_body=$(echo "$complete_response" | sed '$d')

          if [ "$complete_http_code" != "200" ]; then
            echo "::error::ipfs.ninja upload complete failed (HTTP $complete_http_code): $complete_body"
            exit 1
          fi

          returned_cid=$(echo "$complete_body" | jq -r '.cid')
          if [ "$returned_cid" != "$CID" ]; then
            echo "::warning::ipfs.ninja returned CID $returned_cid, expected $CID"
          fi
          echo "Uploaded CAR to ipfs.ninja (CID ${returned_cid})"

  upload-pinata:
    runs-on: ubuntu-latest
    needs:
      - build
      - create-ipfs-car
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          name: build-dist
          path: dist

      # Pinata's CAR upload path (v3 /files with car=true) isn't available on
      # the free plan, and the v3 API doesn't support folder uploads at all
      # yet. Pin-by-CID (fetching the content over the network) works, but
      # Pinata has to discover it via the DHT first, which can be slow or
      # flaky for a small/newer pinning host. Uploading directly through the
      # legacy pinFileToIPFS endpoint means Pinata serves the content itself
      # immediately, so DNSLink propagates faster.
      - name: Upload dist to Pinata
        id: upload-pinata
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          CID: ${{ needs.create-ipfs-car.outputs.cid }}
        run: |
          PIN_NAME="${GITHUB_REPOSITORY//\//-}-${GITHUB_SHA:0:7}"

          # curl's -K config file takes one "form" line per file, which lets
          # us upload every file in dist/ as its own multipart part without
          # needing shell arrays. Pinata rejects the request if the parts
          # don't share a single common top-level path segment ("More than
          # one file and/or directory was provided for pinning"), so we keep
          # each file's filename as its full "dist/..." path rather than
          # stripping the dist/ prefix -- that makes "dist" the one shared
          # top-level folder Pinata pins.
          curl_config=$(mktemp)
          find dist -type f | while read -r file; do
            printf 'form = "file=@%s;filename=%s"\n' "$file" "$file" >> "$curl_config"
          done
          printf 'form = "pinataMetadata={\\"name\\":\\"%s\\"}"\n' "$PIN_NAME" >> "$curl_config"
          printf 'form = "pinataOptions={\\"cidVersion\\":1}"\n' >> "$curl_config"

          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "Authorization: Bearer ${PINATA_JWT}" \
            -K "$curl_config")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [ "$http_code" != "200" ]; then
            echo "::error::Pinata upload failed (HTTP $http_code): $body"
            exit 1
          fi

          returned_cid=$(echo "$body" | jq -r '.IpfsHash')
          if [ "$returned_cid" != "$CID" ]; then
            echo "::warning::Pinata returned CID $returned_cid, expected $CID"
          fi
          echo "Uploaded dist/ to Pinata (CID ${returned_cid})"

  update-ipns-dnslink:
    runs-on: ubuntu-latest
    needs:
      - create-ipfs-car
      - upload-ipfs-ninja
      - upload-pinata
    # `needs` waits for all three regardless; `always()` stops GitHub from
    # auto-skipping this job just because one of the two uploads failed, so
    # only the explicit condition below decides whether to run.
    #
    # We want either of the uploads to succeed, as we need the CID to exist in
    # the IPFS network.
    if: |
      always() &&
      needs.create-ipfs-car.result == 'success' &&
      (needs.upload-ipfs-ninja.result == 'success' || needs.upload-pinata.result == 'success')
    steps:
      - name: Update DNSLink Record in Cloudflare DNS
        uses: ipshipyard/dnslink-action@v1.1.3
        with:
          github_token: ${{ github.token }}
          cid: ${{ needs.create-ipfs-car.outputs.cid }} # The `_dnslink=...` string is automatically constructed from the CID
          dnslink_domain: 'jamesyoung.ch'
          cf_record_id: ${{ secrets.CLOUDFLARE_DNS_RECORD_ID }}
          cf_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          cf_auth_token: ${{ secrets.CLOUDFLARE_AUTH_TOKEN }}
